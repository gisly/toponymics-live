name: toponymics

services:
  # ─── База данных ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"  # удобно для DBeaver/pgcli с хоста; в проде закомментировать
    restart: unless-stopped

  # ─── Кеш и сессии ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - ./redis-data:/data
    restart: unless-stopped

  # ─── Сборщик CSS (Tailwind) ─────────────────────────────────────────
  # Отрабатывает один раз, собирает main.css из main.input.css,
  # затем переходит в watch-режим. Можно остановить после первой сборки
  # если не редактируешь шаблоны: docker compose stop tailwind
  tailwind:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules  # анонимный volume, чтобы хост не затирал
    command: >
      sh -c "npm install --no-audit --no-fund &&
             npm run watch:css"
    restart: unless-stopped

  # ─── Django + Wagtail ────────────────────────────────────────────────
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./media-local:/app/media
      - ./data-migration:/data-migration   # для импортёра
      - ./pmtiles-local:/app/pmtiles-local:ro
      - ./map-style:/app/map-style:ro
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_URL: ${REDIS_URL}
      MEDIA_ROOT: ${MEDIA_ROOT}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── React-фронт (для карты на /platform) ───────────────────────────
  # Запускается только с --profile map: docker compose --profile map up
  # Пока сайт основан на Wagtail-шаблонах, фронт нужен только для разработки карты.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./map-style:/app/public/map-style:ro
      - ./pmtiles-local:/app/public/pmtiles:ro

    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_PMTILES_URL: ${VITE_PMTILES_URL}
      VITE_MAP_STYLE_URL: ${VITE_MAP_STYLE_URL}
    ports:
      - "5173:5173"
    depends_on:
      - django
    restart: unless-stopped
    profiles: [map]
