{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Внутренняя ошибка" %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 py-20 text-center">
    <p class="text-sm uppercase tracking-wider text-stone-500 mb-3">500</p>
    <h1 class="text-3xl font-semibold text-stone-900 mb-4">
        {% trans "Что-то пошло не так" %}
    </h1>
    <p class="text-lg text-stone-700 mb-8 leading-relaxed">
        {% trans "Произошла внутренняя ошибка сервера. Мы уже работаем над её устранением." %}
    </p>
    <a href="/" class="inline-block px-5 py-2 bg-stone-900 text-white rounded hover:bg-stone-700">
        {% trans "На главную" %}
    </a>
</div>
{% endblock %}
